# Strings - Messages.yml
# Bukkit chat colors may be used
# Unless noted otherwise, the prefix from
# config.yml is used before the message.
# Note: these are only messages for commands.
# other messages may be found in other config files.

# No perms message:
no-perms: "&fYou don''t have permission!"

# Cleared own chat message:
chat-cleared: "&fChat cleared."

# Cleared all player's chat message:
chat-cleared-all: "&fAll player''s chats cleared"

# Too many args in command:
too-many-args: "&fToo many arguments!"

# Insufficient args:
insufficient-args: "&fYou don''t have enough arguments!"

# Player on cool-down:
cool-down: "&fYou''re sending messages too quickly!  Try again later."

# Unknown player message:
unknown-player: "&fUnknown player!"

# Player is offline:
player-offline: "&fThat player is offline!"

# No one to reply to:
no-reply: "&fYou have no one to reply to!"
